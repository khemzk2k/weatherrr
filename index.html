<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⛅ Weather App</h1>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Enter city name..." 
                    autocomplete="off"
                >
                <button id="searchBtn">Search</button>
                <button id="locationBtn" title="Use my location">📍</button>
            </div>
            <div id="recentSearches" class="recent-searches"></div>
        </div>

        <!-- Temperature Toggle -->
        <div class="temp-toggle">
            <button id="celsiusBtn" class="active">°C</button>
            <button id="fahrenheitBtn">°F</button>
        </div>

        <!-- Loading State -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading weather...</p>
        </div>

        <!-- Error Message -->
        <div id="error" class="error hidden"></div>

        <!-- Current Weather -->
        <div id="currentWeather" class="current-weather hidden">
            <div class="weather-card">
                <h2 id="cityName"></h2>
                <div class="weather-main">
                    <div id="weatherIcon" style="font-size: 100px; text-align: center;"></div>
                    <div class="temp-info">
                        <div id="temperature" class="temperature"></div>
                        <div id="description" class="description"></div>
                    </div>
                </div>
                <div class="weather-details">
                    <div class="detail">
                        <span class="label">Feels Like</span>
                        <span id="feelsLike" class="value"></span>
                    </div>
                    <div class="detail">
                        <span class="label">Humidity</span>
                        <span id="humidity" class="value"></span>
                    </div>
                    <div class="detail">
                        <span class="label">Wind Speed</span>
                        <span id="windSpeed" class="value"></span>
                    </div>
                    <div class="detail">
                        <span class="label">Pressure</span>
                        <span id="pressure" class="value"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 5-Day Forecast -->
        <div id="forecast" class="forecast hidden">
            <h3>5-Day Forecast</h3>
            <div id="forecastCards" class="forecast-cards"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
